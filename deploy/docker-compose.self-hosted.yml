services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      SUPABASE_AUTH_URL: ${SUPABASE_AUTH_URL}
      SUPABASE_AUTH_SERVICE_ROLE_KEY: ${SUPABASE_AUTH_SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: ${SUPABASE_DB_URL}
      SUPABASE_DB_SERVICE_ROLE_KEY: ${SUPABASE_DB_SERVICE_ROLE_KEY}
      PORTFOLIO_ALLOWED_ORIGINS: ${PORTFOLIO_ALLOWED_ORIGINS}
      PORTFOLIO_ALLOWED_ORIGIN_REGEX: ${PORTFOLIO_ALLOWED_ORIGIN_REGEX:-}
      PORTFOLIO_ADMIN_EMAILS: ${PORTFOLIO_ADMIN_EMAILS:-}
      PORTFOLIO_MAX_UPLOAD_BYTES: ${PORTFOLIO_MAX_UPLOAD_BYTES:-5242880}
      PORTFOLIO_PUBLIC_CACHE_TTL_SECONDS: ${PORTFOLIO_PUBLIC_CACHE_TTL_SECONDS:-30}
      PORTFOLIO_PUBLIC_CACHE_STALE_SECONDS: ${PORTFOLIO_PUBLIC_CACHE_STALE_SECONDS:-300}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      PORTFOLIO_GITHUB_COMMIT_CACHE_TTL_SECONDS: ${PORTFOLIO_GITHUB_COMMIT_CACHE_TTL_SECONDS:-900}
      PORTFOLIO_KEEPALIVE_URL: ${PORTFOLIO_KEEPALIVE_URL:-}
      PORTFOLIO_KEEPALIVE_INTERVAL_SECONDS: ${PORTFOLIO_KEEPALIVE_INTERVAL_SECONDS:-600}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-__same_origin__}
        VITE_ENABLE_SUPABASE_IMAGE_TRANSFORMS: ${VITE_ENABLE_SUPABASE_IMAGE_TRANSFORMS:-false}
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
