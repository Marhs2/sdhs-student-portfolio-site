name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    name: Ping backend health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Request Render health endpoint
        env:
          HEALTH_URL: https://sdhs-student-portfolio-site.onrender.com/health
        run: |
          curl --fail --silent --show-error --location \
            --max-time 20 \
            --retry 2 \
            --retry-delay 5 \
            "$HEALTH_URL"
