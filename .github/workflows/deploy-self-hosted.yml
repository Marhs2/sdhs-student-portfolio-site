name: Deploy Self Hosted

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: self-hosted-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          DEPLOY_BRANCH: ${{ github.event.workflow_run.head_branch || 'main' }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "
            set -e
            cd \"$APP_DIR\"
            git fetch origin \"$DEPLOY_BRANCH\"
            git reset --hard \"origin/$DEPLOY_BRANCH\"
            docker compose -f deploy/docker-compose.self-hosted.yml --env-file deploy/.env up -d --build --remove-orphans
            docker image prune -f
          "
