services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PORTFOLIO_ALLOWED_ORIGINS
        value: https://sdhs-student-portfolio-site.vercel.app,https://portfoilo-s-ite-rsgx.vercel.app,https://portfoilo-site-fullstack.vercel.app
      - key: PORTFOLIO_ALLOWED_ORIGIN_REGEX
        value: ""
      - key: PORTFOLIO_ADMIN_EMAILS
        sync: false
      - key: PORTFOLIO_MAX_UPLOAD_BYTES
        value: "5242880"
      - key: GITHUB_TOKEN
        sync: false
      - key: PORTFOLIO_GITHUB_COMMIT_CACHE_TTL_SECONDS
        value: "900"
      - key: PORTFOLIO_KEEPALIVE_URL
        value: https://sdhs-student-portfolio-site.onrender.com/health
      - key: PORTFOLIO_KEEPALIVE_INTERVAL_SECONDS
        value: "600"
